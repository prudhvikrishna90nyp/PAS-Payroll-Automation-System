<aside class="app-sidebar d-flex flex-column flex-shrink-0" id="appSidebar">
    <div class="sidebar-brand px-3 py-4">
        <a href="{% url 'dashboard' %}" class="d-flex align-items-center text-decoration-none text-white">
            <span class="brand-icon me-2">₹</span>
            <div>
                <strong class="d-block">{{ APP_NAME }}</strong>
                <small class="text-white-50">{{ APP_FULL_NAME }}</small>
            </div>
        </a>
    </div>

    <div class="list-group list-group-flush sidebar-nav px-2 pb-4">
        <a href="{% url 'dashboard' %}" class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
            <i class="bi bi-speedometer2 me-2"></i> Dashboard
        </a>
        <a
            href="{% url 'clients:client_list' %}"
            class="list-group-item list-group-item-action {% if request.resolver_match.namespace == 'clients' %}active{% endif %}"
        >
            Clients
        </a>
        <a
            href="{% url 'company:company_list' %}"
            class="list-group-item list-group-item-action {% if request.resolver_match.namespace == 'company' %}active{% endif %}"
        >
            <i class="bi bi-building me-2"></i> Companies
        </a>
        <a
            href="{% url 'organisation:branch_list' %}"
            class="list-group-item list-group-item-action {% if request.resolver_match.namespace == 'organisation' and 'branch' in request.resolver_match.url_name %}active{% endif %}"
        >
            <i class="bi bi-diagram-3 me-2"></i> Branches
        </a>
        <a
            href="{% url 'organisation:department_list' %}"
            class="list-group-item list-group-item-action {% if request.resolver_match.namespace == 'organisation' and 'department' in request.resolver_match.url_name %}active{% endif %}"
        >
            <i class="bi bi-grid me-2"></i> Departments
        </a>
        <a
            href="{% url 'organisation:designation_list' %}"
            class="list-group-item list-group-item-action {% if request.resolver_match.namespace == 'organisation' and 'designation' in request.resolver_match.url_name %}active{% endif %}"
        >
            <i class="bi bi-person-badge me-2"></i> Designations
        </a>
        <a
            href="{% url 'employees:employee_list' %}"
            class="list-group-item list-group-item-action {% if request.resolver_match.namespace == 'employees' %}active{% endif %}"
        >
            <i class="bi bi-people me-2"></i> Employees
        </a>
        <a href="{% url 'attendance_list' %}" class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'attendance_list' %}active{% endif %}">
            <i class="bi bi-calendar-check me-2"></i> Attendance
        </a>
        <a href="{% url 'payslip_list' %}" class="list-group-item list-group-item-action {% if 'payslip' in request.resolver_match.url_name %}active{% endif %}">
            <i class="bi bi-cash-stack me-2"></i> Payroll
        </a>
        <a href="{% url 'reports_index' %}" class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'reports_index' %}active{% endif %}">
            <i class="bi bi-bar-chart me-2"></i> Reports
        </a>
        <a href="/admin/" class="list-group-item list-group-item-action">
            <i class="bi bi-gear me-2"></i> Admin
        </a>
    </div>
</aside>
